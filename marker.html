<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Script Marker Pro - Vision Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
body{font-family:'Inter',sans-serif;background:#0f172a;color:#f1f5f9;margin:0;padding-bottom:50px}
.main{max-width:800px;margin:0 auto;padding:15px}
.card{background:#1e293b;border:1px solid #334155;border-radius:15px;padding:18px;margin-bottom:15px}
.logo-area{display:flex;align-items:center;padding:15px;background:#1e293b;border-bottom:1px solid #334155}
.logo-box{width:35px;height:35px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;margin-right:10px}
label{font-size:11px;color:#93c5fd;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px}
input,textarea,select{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #475569;background:#0f172a;color:white;font-size:16px}
.btn{width:100%;padding:15px;border-radius:12px;border:none;font-weight:700;cursor:pointer;margin-top:5px;transition:0.2s}
.btn-primary{background:#3b82f6;color:white}
.btn-upload{background:#10b981;color:white;font-size:13px;padding:10px}
.student-slot{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:15px;margin-bottom:15px;border-left:5px solid #3b82f6}
.preview-img{width:60px;height:60px;object-fit:cover;border-radius:5px;margin:5px;border:1px solid #475569}
.status-log{background:#000;padding:15px;border-radius:10px;font-size:13px;min-height:60px;border-left:4px solid #3b82f6}
.page{display:none} .active{display:block}
</style>
</head>
<body>

<div class="logo-area">
  <div class="logo-box"></div>
  <div>
    <div style="font-weight:800;font-size:14px">AI Script Marker Pro</div>
    <div style="font-size:10px;color:#94a3b8">Vision & Batch Enabled (2026)</div>
  </div>
</div>

<div class="main">
  <div id="page1" class="page active">
    <div class="card">
      <label>Step 1: Gemini API Key</label>
      <input type="password" id="apiKey" placeholder="Paste AIza... key">
      <label>Step 2: Subject & Questions</label>
      <input type="text" id="subject" placeholder="e.g. Civic Education">
      <textarea id="questions" rows="4" placeholder="Paste the exam questions/marking scheme here..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="showPage(2)">Next: Upload Scripts </button>
  </div>

  <div id="page2" class="page">
    <div id="studentContainer"></div>
    <button class="btn" style="background:rgba(255,255,255,0.1); color:white" onclick="addStudentSlot()">+ Add Another Student</button>
    <button class="btn btn-primary" style="margin-top:20px" onclick="runVisionBatch()"> Start AI Vision Marking</button>
  </div>

  <div id="page3" class="page">
    <div class="card">
      <label id="progTitle">AI is reading scripts...</label>
      <div id="log" class="status-log">Waiting...</div>
    </div>
    <div id="resultsArea"></div>
    <button class="btn btn-primary" onclick="location.reload()">Reset for New Class</button>
  </div>
</div>

<script>
let students = [];
const MODEL = 'gemini-3-flash-preview';

function showPage(num) {
  document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === (num-1)));
  if(num === 2 && students.length === 0) addStudentSlot();
}

function addStudentSlot() {
  const id = students.length;
  students.push({ id, name: '', files: [] });
  
  const div = document.createElement('div');
  div.className = 'student-slot';
  div.id = `slot-${id}`;
  div.innerHTML = `
    <label>Student Name</label>
    <input type="text" oninput="students[${id}].name=this.value" placeholder="Full Name">
    <label>Upload Script Images</label>
    <input type="file" accept="image/*" multiple onchange="handleFiles(event, ${id})">
    <div id="preview-${id}" style="display:flex; flex-wrap:wrap"></div>
  `;
  document.getElementById('studentContainer').appendChild(div);
}

function handleFiles(event, id) {
  const files = Array.from(event.target.files);
  students[id].files = files;
  const preview = document.getElementById(`preview-${id}`);
  preview.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.innerHTML += `<img src="${e.target.result}" class="preview-img">`;
    };
    reader.readAsDataURL(file);
  });
}

// Convert file to Base64 for the AI
const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = error => reject(error);
});

async function runVisionBatch() {
  const key = document.getElementById('apiKey').value;
  if(!key) { alert("Please enter API Key"); return; }
  
  showPage(3);
  const log = document.getElementById('log');
  
  for(let i=0; i<students.length; i++) {
    const s = students[i];
    if(s.files.length === 0) continue;

    log.innerHTML = `<b>Marking ${i+1}/${students.length}:</b> ${s.name}...`;

    // Convert all images for this student
    const imageParts = await Promise.all(s.files.map(async (f) => ({
      inlineData: { mimeType: f.type, data: await toBase64(f) }
    })));

    const prompt = `Read these script images for student ${s.name}. 
    QUESTIONS: ${document.getElementById('questions').value}
    SUBJECT: ${document.getElementById('subject').value}
    Evaluate the answers and provide a score.
    Return ONLY JSON: {"name":"${s.name}", "score":0, "remarks":"..."}`;

    try {
      const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [...imageParts, { text: prompt }] }] })
      });

      const data = await resp.json();
      let aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
      
      // Auto-repair JSON
      aiText = aiText.replace(/```json|```/g, "").trim();
      if (!aiText.startsWith('{')) aiText = '{' + aiText;
      if (!aiText.endsWith('}')) aiText += '}';

      const res = JSON.parse(aiText);
      document.getElementById('resultsArea').innerHTML += `
        <div class="card" style="border-left: 5px solid #10b981">
          <b>${res.name}</b> — <span style="color:#10b981">Score: ${res.score}/100</span><br>
          <p style="font-size:13px; opacity:0.8; margin-top:5px">${res.remarks}</p>
        </div>`;
    } catch (e) {
      log.innerHTML += `<br><span style="color:red">Error marking ${s.name}</span>`;
    }
  }
  log.innerHTML = "<b>Processing Complete.</b>";
}
</script>
</body>
</html>
