name: Validate Notification System

on:
  pull_request:
    paths:
      - "notification-system/**"
      - "vercel.json"
      - ".github/workflows/validate-notification-system.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate JavaScript
        run: |
          node --check notification-system/config.js
          node --check notification-system/session-hardening.js
          node --check notification-system/app.js
          node --check notification-system/service-worker.js
      - name: Confirm application files and API bindings
        run: |
          test -s notification-system/index.html
          test -s notification-system/styles.css
          test -s notification-system/config.js
          test -s notification-system/notification-config.json
          test -s notification-system/session-hardening.js
          test -s notification-system/app.js
          test -s notification-system/service-worker.js
          test -s notification-system/manifest.webmanifest
          test -s notification-system/app-icon.svg
          test -s notification-system/vercel.json
          grep -q 'Notification Dashboard' notification-system/index.html
          grep -q 'school_notification_console_read_api' notification-system/app.js
          grep -q 'school_notification_console_write_api' notification-system/app.js
          grep -q 'runMockProviderTest' notification-system/app.js
          grep -q 'prepareAttendanceDrafts' notification-system/app.js
          grep -q 'sessionStorage' notification-system/session-hardening.js
          grep -q 'notification-config.json' notification-system/config.js
          grep -q 'view=contacts' vercel.json
          grep -q 'X-Frame-Options' vercel.json
          if grep -RIn 'attendance-notification-dispatch' notification-system; then
            echo "Obsolete attendance dispatcher dependency remains."
            exit 1
          fi
      - name: Serve and verify local application shell
        run: |
          python3 -m http.server 4174 --directory notification-system >/tmp/notification-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 1
          curl -fsS http://127.0.0.1:4174/index.html | grep -q 'Notification Dashboard'
          curl -fsS http://127.0.0.1:4174/styles.css | grep -q '.app-shell'
          curl -fsS http://127.0.0.1:4174/config.js | grep -q 'WTSNotificationConfigReady'
          curl -fsS http://127.0.0.1:4174/notification-config.json | grep -q 'supabaseUrl'
          curl -fsS http://127.0.0.1:4174/app.js | grep -q 'school_notification_console_read_api'
          curl -fsS http://127.0.0.1:4174/manifest.webmanifest | grep -q 'WTS Notification Management'
          curl -fsS http://127.0.0.1:4174/app-icon.svg | grep -q '<svg'
      - name: Reject server-side secrets
        run: |
          if grep -RIn --exclude='*.md' --exclude='*.yml' --exclude='*.yaml' -E 'SUPABASE_SERVICE_ROLE_KEY|service_role_key|x-wts-device-secret|WTS_WHATSAPP_GATEWAY_TOKEN' notification-system; then
            echo "Server-side secret reference found in Notification frontend."
            exit 1
          fi
