name: Build Attendance Scanner APK

on:
  pull_request:
    paths:
      - "attendance-app/**"
      - "settings.gradle"
      - "build.gradle"
      - ".github/workflows/build-attendance-apk.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build attendance scanner APK
        id: build
        shell: bash
        run: |
          set -o pipefail
          gradle :attendance-app:assembleDebug --stacktrace 2>&1 | tee attendance-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-build-log
          path: attendance-build.log
          if-no-files-found: warn

      - name: Upload attendance scanner APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wts-attendance-scanner-debug
          path: attendance-app/build/outputs/apk/debug/attendance-app-debug.apk
          if-no-files-found: error
