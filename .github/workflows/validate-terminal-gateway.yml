name: Validate Attendance Terminal Gateway

on:
  pull_request:
    paths:
      - "terminal-gateway/**"
      - ".github/workflows/validate-terminal-gateway.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate terminal gateway
        working-directory: terminal-gateway
        run: npm run check

      - name: Confirm required files
        run: |
          test -s terminal-gateway/package.json
          test -s terminal-gateway/src/server.mjs
          test -s terminal-gateway/src/queue.mjs
          test -s terminal-gateway/README.md
