name: Validate Standalone Attendance

on:
  pull_request:
    paths:
      - "attendance-dashboard/**"
      - "index.html"
      - ".github/workflows/validate-standalone-attendance.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate application JavaScript
        run: |
          node --check attendance-dashboard/session-hardening.js
          node --check attendance-dashboard/app.js
          node --check attendance-dashboard/service-worker.js
          node --check attendance-dashboard/staff-portal-security-patch.js
          node --check attendance-dashboard/staff-applications.js
      - name: Confirm production application files
        run: |
          test -s attendance-dashboard/index.html
          test -s attendance-dashboard/control-room.html
          test -s attendance-dashboard/pilot-readiness.html
          test -s attendance-dashboard/staff-portal.html
          test -s attendance-dashboard/staff-portal-secure.html
          test -s attendance-dashboard/staff-portal-security-patch.js
          test -s attendance-dashboard/staff-applications.html
          test -s attendance-dashboard/staff-applications.js
          test -s attendance-dashboard/styles.css
          test -s attendance-dashboard/production-ui.css
          test -s attendance-dashboard/session-hardening.js
          test -s attendance-dashboard/manifest.webmanifest
          test -s attendance-dashboard/app-icon.svg
          test -s attendance-dashboard/service-worker.js
          grep -q '/attendance-dashboard/styles.css' attendance-dashboard/index.html
          grep -q '/attendance-dashboard/session-hardening.js' attendance-dashboard/index.html
          grep -q 'Critical fallback' attendance-dashboard/index.html
          grep -q 'serviceWorker' attendance-dashboard/index.html
          grep -q 'sessionStorage' attendance-dashboard/session-hardening.js
          grep -q 'TIMEOUT_MS' attendance-dashboard/session-hardening.js
          grep -q 'pilot-readiness.html' attendance-dashboard/control-room.html
          grep -q 'Temporary records remaining' attendance-dashboard/pilot-readiness.html
          grep -q 'embedded=1' attendance-dashboard/staff-portal-secure.html
          grep -q 'createSignedUrl' attendance-dashboard/staff-portal-security-patch.js
          grep -q 'staff-profile-photos' attendance-dashboard/staff-portal-security-patch.js
          grep -q 'staff_application_admin_read_api' attendance-dashboard/staff-applications.js
          grep -q 'staff_application_admin_write_api' attendance-dashboard/staff-applications.js
          grep -q 'archiveStaff' attendance-dashboard/staff-applications.js
      - name: Reject server-side secrets in frontend
        run: |
          if grep -RIn --exclude='*.md' --exclude='*.yml' --exclude='*.yaml' -E 'SUPABASE_SERVICE_ROLE_KEY|service_role_key|x-wts-device-secret' attendance-dashboard; then
            echo "Server-side secret reference found in attendance frontend."
            exit 1
          fi
