name: Validate Attendance Dashboard

on:
  pull_request:
    paths:
      - "attendance-dashboard/**"
      - ".github/workflows/validate-attendance-dashboard.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript syntax
        run: |
          node --check attendance-dashboard/app.js
          node --check attendance-dashboard/qr-print.js
          node --check attendance-dashboard/qr-print-autoload.js
          node --check attendance-dashboard/staff.js
          node --check attendance-dashboard/staff-qr-print.js
          node --check attendance-dashboard/staff-portal.js
          node --check attendance-dashboard/student-departures.js
          node --check attendance-dashboard/device-security.js
          node --check attendance-dashboard/operations.js
          node --check attendance-dashboard/operations-core.js
          node --check attendance-dashboard/operations-roster.js
          node --check attendance-dashboard/operations-calendar.js

      - name: Confirm dashboard files
        run: |
          test -s attendance-dashboard/control-room.html
          test -s attendance-dashboard/index.html
          test -s attendance-dashboard/styles.css
          test -s attendance-dashboard/app.js
          test -s attendance-dashboard/qr-print.html
          test -s attendance-dashboard/qr-print.css
          test -s attendance-dashboard/qr-print.js
          test -s attendance-dashboard/qr-print-autoload.js
          test -s attendance-dashboard/staff.html
          test -s attendance-dashboard/staff.css
          test -s attendance-dashboard/staff.js
          test -s attendance-dashboard/staff-qr-print.html
          test -s attendance-dashboard/staff-qr-print.js
          test -s attendance-dashboard/staff-portal.html
          test -s attendance-dashboard/staff-portal.js
          test -s attendance-dashboard/student-departures.html
          test -s attendance-dashboard/student-departures.js
          test -s attendance-dashboard/device-security.html
          test -s attendance-dashboard/device-security.js
          test -s attendance-dashboard/operations.html
          test -s attendance-dashboard/operations.js
          test -s attendance-dashboard/operations-core.js
          test -s attendance-dashboard/operations-roster.js
          test -s attendance-dashboard/operations-calendar.js
