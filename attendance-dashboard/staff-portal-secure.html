<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b1f3a">
  <title>WTS Secure Staff Portal</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:#f3f7fb;font-family:Arial,sans-serif}.shell{height:100%;display:grid;grid-template-rows:auto 1fr}.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;background:#0b1f3a;color:#fff}.bar strong,.bar small{display:block}.bar small{margin-top:2px;color:#a8e6cc}.bar a{padding:8px 11px;border:1px solid rgba(255,255,255,.35);border-radius:8px;color:#fff;text-decoration:none;font-size:11px;font-weight:700}.frame{width:100%;height:100%;border:0;background:#f3f7fb}@media(max-width:600px){.bar{padding:9px 10px}.bar small{display:none}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="bar"><div><strong>WTS Staff Self-Service</strong><small>Independent attendance identity • Private photograph storage</small></div><a href="./control-room.html">Control Room</a></header>
    <iframe id="staffPortalFrame" class="frame" src="./staff-portal.html?embedded=1" title="WTS Staff Attendance Portal"></iframe>
  </main>
  <script>
    document.getElementById("staffPortalFrame").addEventListener("load",function(){
      const doc=this.contentDocument;
      if(!doc||doc.getElementById("staffPortalSecurityPatch"))return;
      const script=doc.createElement("script");
      script.id="staffPortalSecurityPatch";
      script.src="./staff-portal-security-patch.js?v=20260712-5";
      script.onload=()=>{try{this.contentWindow.loadAccount();}catch{}};
      doc.body.appendChild(script);
    });
  </script>
</body>
</html>
