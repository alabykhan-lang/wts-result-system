<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WTS Attendance Management Report</title><link rel="stylesheet" href="./styles.css"><style>body{background:#eef2f6}.toolbar{max-width:1180px;margin:18px auto;padding:16px;display:flex;gap:10px;align-items:end;flex-wrap:wrap;background:#fff;border-radius:14px;box-shadow:0 8px 28px rgba(11,31,58,.08)}.toolbar .field{min-width:150px}.report{width:210mm;min-height:297mm;margin:18px auto;padding:15mm;background:#fff;box-shadow:0 10px 40px rgba(11,31,58,.13);color:#172033}.report-head{text-align:center;border-bottom:3px solid #0b1f3a;padding-bottom:12px}.report-head h1{margin:5px 0;font:700 22px Georgia,serif;color:#0b1f3a}.report-head p{margin:3px 0}.meta{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}.meta div{padding:8px;background:#f6f8fb;border:1px solid #dfe5ec}.meta span,.meta strong{display:block}.meta span{font-size:9px;text-transform:uppercase;color:#667085}.meta strong{margin-top:4px}.report h2{font:700 16px Georgia,serif;color:#0b1f3a;border-bottom:1px solid #dfe5ec;padding-bottom:5px;margin:20px 0 8px}.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.summary-card{padding:10px;border:1px solid #dfe5ec;border-radius:8px}.summary-card span,.summary-card strong{display:block}.summary-card span{font-size:9px;color:#667085;text-transform:uppercase}.summary-card strong{font-size:20px;margin-top:5px}.report table{width:100%;border-collapse:collapse;font-size:9px}.report th,.report td{border:1px solid #cfd6df;padding:5px;text-align:left}.report th{background:#e8eef6;color:#0b1f3a;text-transform:uppercase}.footer{margin-top:24px;padding-top:10px;border-top:1px solid #dfe5ec;display:flex;justify-content:space-between;font-size:9px;color:#667085}.empty{padding:30px;text-align:center;color:#667085}.page-break{break-before:page}@media(max-width:900px){.report{width:auto;min-height:0;margin:8px;padding:18px}.meta,.summary-grid{grid-template-columns:1fr 1fr}}@media print{body{background:#fff}.toolbar,#toastContainer{display:none!important}.report{width:auto;min-height:0;margin:0;padding:8mm;box-shadow:none}.report table{font-size:8px}@page{size:A4 portrait;margin:8mm}}</style></head><body><div class="toolbar"><a class="secondary-button" href="./control-room.html">Control Room</a><div class="field"><label>Report</label><select id="reportType"><option value="overview">Executive overview</option><option value="classes">Class summary</option><option value="students">Student summary</option><option value="staff">Staff summary</option><option value="controls">Governance and readiness</option></select></div><div class="field"><label>From</label><input type="date" id="fromDate"></div><div class="field"><label>To</label><input type="date" id="toDate"></div><div class="field"><label>Class</label><select id="classKey"><option value="">All classes</option><option value="jss1">JSS 1</option><option value="jss2">JSS 2</option><option value="jss3">JSS 3</option><option value="ss1-general">SS 1</option><option value="ss2-arts">SS 2 Arts</option><option value="ss2-business">SS 2 Business</option><option value="ss2-science">SS 2 Science</option><option value="ss3-arts">SS 3 Arts</option><option value="ss3-science">SS 3 Science</option></select></div><button class="primary-button" id="loadReport">Load report</button><button class="secondary-button" id="printReport">Print / Save PDF</button><button class="secondary-button" id="connectButton">Connect</button></div><main class="report" id="report"><div class="empty"><h2>Attendance Management Report</h2><p>Connect and load a report to begin.</p></div></main><dialog id="connectionDialog"><form method="dialog" class="dialog-card" id="connectionForm"><div class="dialog-header"><div><p class="eyebrow">PRIVATE ADMINISTRATOR ACCESS</p><h2>Connect report service</h2></div><button value="cancel" class="icon-button">×</button></div><div class="field"><label>Administrator code</label><input id="adminCode" required></div><div class="field"><label>Administrator secret</label><input id="adminSecret" type="password" required></div><div class="dialog-actions"><button value="cancel" class="secondary-button">Cancel</button><button value="default" class="primary-button">Connect</button></div></form></dialog><div id="toastContainer" class="toast-container"></div><script src="./dashboard-config-loader.js"></script><script src="./management-report.js"></script></body></html>
