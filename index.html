<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>WTS Result Management System</title>
<style>
  html,body{margin:0;min-height:100%;background:#f0f7f4;font-family:Arial,sans-serif;color:#1a2a4a}
  .loader{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
  .box{background:#fff;border-radius:14px;padding:22px 26px;box-shadow:0 8px 30px rgba(26,42,74,.18);max-width:360px}
  .box h1{font-size:1rem;margin:0 0 8px}.box p{font-size:.82rem;margin:0;color:#4a5568}
</style>
</head>
<body>
<div class="loader"><div class="box"><h1>Loading WTS Result Portal...</h1><p>Please wait while the latest report-card layout is applied.</p></div></div>
<script>
(function(){
  function replaceAllText(source,search,replacement,label){
    if(source.indexOf(search)===-1){console.warn('Portal layout patch not found:',label);return source;}
    return source.split(search).join(replacement);
  }
  fetch('portal_core.html?layout_v=20260723_ca30_no_position',{cache:'no-store'})
    .then(function(r){return r.text();})
    .then(function(html){
      html=replaceAllText(html,
`function computeTotal(sc){
  if(!sc)return'';
  var v=[sc.ca1,sc.ca2,sc.ca3,sc.exam];
  var hasVal=false;
  for(var i=0;i<v.length;i++)if(v[i]!==''&&v[i]!==null&&v[i]!==undefined)hasVal=true;
  if(!hasVal)return'';
  return v.reduce(function(a,x){return a+Number(x||0);},0);
}`,
`function computeTotal(sc){
  if(!sc)return'';
  var caVals=[sc.ca1,sc.ca2,sc.ca3];
  var examVal=sc.exam;
  var hasCa=false;
  for(var i=0;i<caVals.length;i++)if(caVals[i]!==''&&caVals[i]!==null&&caVals[i]!==undefined)hasCa=true;
  var hasExam=examVal!==''&&examVal!==null&&examVal!==undefined;
  if(!hasCa&&!hasExam)return'';
  var caTotal=hasCa?Math.min(30,caVals.reduce(function(a,x){return a+Number(x||0);},0)):0;
  var examTotal=hasExam?Number(examVal||0):0;
  return caTotal+examTotal;
}`,'compute total CA cap');

      html=replaceAllText(html,
`  var resumeDate=fees.resume_date?new Date(fees.resume_date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):fees.resume?new Date(fees.resume).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'--';`,
`  var rdCfg=getResumptionDate();
  var resumeDate=fees.resume_date?new Date(fees.resume_date).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):fees.resume?new Date(fees.resume).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):rdCfg?new Date(rdCfg).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'--';`,'global resumption date');

      html=replaceAllText(html,
`  {key:'showNextTerm', label:'Next Term Begins & Fees'},`,
`  {key:'showNextTerm', label:'Next Term Begins'},`,'settings label');

      html=replaceAllText(html,
`      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">TEST 1<br/><small>(10%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">TEST 2<br/><small>(10%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">TEST 3<br/><small>(10%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">EXAM<br/><small>(70%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">TOTAL<br/><small>(100%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">GRADE</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">POS.</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">CLASS AVG</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">HIGHEST</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">REMARK</th>'`,
`      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">C.A.<br/><small>(30%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">EXAM<br/><small>(70%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">TOTAL<br/><small>(100%)</small></th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">GRADE</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">CLASS AVG</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">HIGHEST</th>'
      +'<th style="padding:5px 3px;text-align:center;border:1px solid '+BORDER+'">REMARK</th>'`,'subject table headings');

      html=replaceAllText(html,
`        var r2=sc[i]||{};var t=tots[i];var gd=getGrade(t);var ss=subjStats[i];
        return'<tr style="background:'+rb+';'+P+'">'
          +'<td style="padding:4px 6px;border:1px solid '+BORDER+';font-weight:600;color:'+NAVY+'">'+subj+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(r2.ca1!==undefined&&r2.ca1!==''?r2.ca1:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(r2.ca2!==undefined&&r2.ca2!==''?r2.ca2:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(r2.ca3!==undefined&&r2.ca3!==''?r2.ca3:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(r2.exam!==undefined&&r2.exam!==''?r2.exam:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';font-weight:700;background:'+rb+'">'+(t!==''?t:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';font-weight:700;color:'+(t!==''?gd.c:'#999')+'">'+(gd.g||'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(ss.pos!=='--'?ss.pos:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+ss.ca+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';color:#065f46;font-weight:600">'+ss.hi+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';color:'+(t!==''?gd.c:'#999')+'">'+( gd.r||'')+'</td>'
          +'</tr>';`,
`        var r2=sc[i]||{};var t=tots[i];var gd=getGrade(t);var ss=subjStats[i];
        var hasCa=(r2.ca1!==undefined&&r2.ca1!==''&&r2.ca1!==null)||(r2.ca2!==undefined&&r2.ca2!==''&&r2.ca2!==null)||(r2.ca3!==undefined&&r2.ca3!==''&&r2.ca3!==null);
        var caTotal=hasCa?Math.min(30,Number(r2.ca1||0)+Number(r2.ca2||0)+Number(r2.ca3||0)):'';
        return'<tr style="background:'+rb+';'+P+'">'
          +'<td style="padding:4px 6px;border:1px solid '+BORDER+';font-weight:600;color:'+NAVY+'">'+subj+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(caTotal!==''?caTotal:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+(r2.exam!==undefined&&r2.exam!==''?r2.exam:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';font-weight:700;background:'+rb+'">'+(t!==''?t:'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';font-weight:700;color:'+(t!==''?gd.c:'#999')+'">'+(gd.g||'')+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+'">'+ss.ca+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';color:#065f46;font-weight:600">'+ss.hi+'</td>'
          +'<td style="padding:4px 3px;text-align:center;border:1px solid '+BORDER+';color:'+(t!==''?gd.c:'#999')+'">'+( gd.r||'')+'</td>'
          +'</tr>';`,'subject table rows');

      html=replaceAllText(html,
`  // NEXT TERM SECTION (separate toggle)
  if(sec.showNextTerm!==false&&(getNextTermFee(CLS)||getResumptionDate())){
    h+='<table style="width:100%;border-collapse:collapse;border-top:1px solid '+BORDER+'">'
      +'<tr>'
      +'<th style="background:'+MINT+';padding:5px 8px;text-align:center;border:1px solid '+BORDER+';font-size:8pt;'+P+'">Next Term Fees</th>'
      +'<th style="background:'+MINT+';padding:5px 8px;text-align:center;border:1px solid '+BORDER+';font-size:8pt;'+P+'">Next Term Begins</th>'
      +'</tr><tr>'
      +'<td style="padding:6px 8px;text-align:center;border:1px solid '+BORDER+';font-weight:700">'+(getNextTermFee(CLS)?'₦'+Number(getNextTermFee(CLS)).toLocaleString():'--')+'</td>'
      +'<td style="padding:6px 8px;text-align:center;border:1px solid '+BORDER+';font-weight:700;color:'+TEAL+'">'+resumeDate+'</td>'
      +'</tr></table>';
  }`,
`  // NEXT TERM SECTION (resumption date only)
  if(sec.showNextTerm!==false&&getResumptionDate()){
    h+='<table style="width:100%;border-collapse:collapse;border-top:1px solid '+BORDER+'">'
      +'<tr>'
      +'<th style="background:'+MINT+';padding:5px 8px;text-align:center;border:1px solid '+BORDER+';font-size:8pt;'+P+'">Next Term Begins</th>'
      +'</tr><tr>'
      +'<td style="padding:6px 8px;text-align:center;border:1px solid '+BORDER+';font-weight:700;color:'+TEAL+'">'+resumeDate+'</td>'
      +'</tr></table>';
  }`,'next term resumption only');

      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(err){
      console.error(err);
      document.body.innerHTML='<div class="loader"><div class="box"><h1>Portal failed to load</h1><p>Please refresh the page or check your internet connection.</p></div></div>';
    });
})();
</script>
</body>
</html>
